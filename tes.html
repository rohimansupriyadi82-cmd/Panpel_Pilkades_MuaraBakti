<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Usia Pilkades Muara Bakti 2026</title>
    <!-- Tailwind CSS untuk Desain Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts untuk Tipografi yang Rapi -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between text-slate-800">

    <!-- BAGIAN ATAS: LOGO & HEADER -->
    <header class="w-full text-center pt-8 px-4 flex flex-col items-center">
        <!-- Logo dari Link yang Diberikan -->
        <div class="bg-white p-3 rounded-full shadow-md mb-4 max-w-[120px] max-h-[120px] flex items-center justify-center overflow-hidden border border-slate-100">
            <img src="https://cdn.phototourl.com/free/2026-06-11-c4f86090-2882-4167-94b6-dd64851fcf05.jpg" 
                 alt="Logo Pilkades Muara Bakti" 
                 class="w-full h-auto object-contain"
                 onerror="this.onerror=null; this.src='https://placehold.co/100x100?text=LOGO';">
        </div>
        <h1 class="text-2xl md:text-3xl font-bold text-emerald-700 tracking-tight">PANITIA PILKADES MUARA BAKTI</h1>
        <p class="text-sm md:text-base text-slate-500 font-medium mt-1">Kecamatan Babelan, Kabupaten Bekasi</p>
    </header>

    <!-- BAGIAN UTAMA: DASHBOARD HITUNG USIA -->
    <main class="flex-grow flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-xl border border-slate-100 p-6 md:p-8 transition-all">
            
            <!-- Info Hari Pelaksanaan -->
            <div class="bg-emerald-50 rounded-xl p-4 mb-6 border border-emerald-100 text-center">
                <span class="text-xs font-bold text-emerald-800 uppercase tracking-wider block mb-1">Hari Pelaksanaan Pilkades</span>
                <span class="text-base font-semibold text-emerald-900 block">Minggu, 20 September 2026</span>
            </div>

            <!-- Form Input -->
            <div class="space-y-4">
                <div>
                    <label for="birthdate" class="block text-sm font-semibold text-slate-700 mb-2">Masukkan Tanggal Lahir Warga :</label>
                    <input type="date" id="birthdate" 
                           class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition text-base font-medium placeholder-slate-400 shadow-sm">
                </div>

                <button onclick="hitungUsia()" 
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-md hover:shadow-lg transition-all transform active:scale-[0.98] mt-2 tracking-wide text-center block">
                    HITUNG USIA SEKARANG
                </button>
            </div>

            <!-- HASIL PERHITUNGAN (Hidden by default, muncul saat dihitung) -->
            <div id="result-box" class="hidden mt-8 pt-6 border-t border-slate-100 animate-fadeIn">
                <h3 class="text-center text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Hasil Analisis Usia pada 20 September 2026</h3>
                
                <!-- Grid Angka Usia -->
                <div class="grid grid-cols-3 gap-3 text-center mb-6">
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span id="res-years" class="block text-2xl md:text-3xl font-extrabold text-emerald-600">0</span>
                        <span class="text-[11px] font-bold text-slate-500 uppercase">Tahun</span>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span id="res-months" class="block text-2xl md:text-3xl font-extrabold text-emerald-600">0</span>
                        <span class="text-[11px] font-bold text-slate-500 uppercase">Bulan</span>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <span id="res-days" class="block text-2xl md:text-3xl font-extrabold text-emerald-600">0</span>
                        <span class="text-[11px] font-bold text-slate-500 uppercase">Hari</span>
                    </div>
                </div>

                <!-- Status Kelayakan Singkat (Opsional & Informatif) -->
                <div id="status-badge" class="text-center p-3 rounded-xl text-sm font-bold shadow-sm">
                    <!-- Status akan diisi oleh JavaScript -->
                </div>
            </div>

        </div>
    </main>

    <!-- BAGIAN BAWAH: FOOTER COPYRIGHT -->
    <footer class="w-full text-center py-6 px-4 bg-slate-900 text-slate-400 text-xs md:text-sm border-t border-slate-800">
        <p>&copy; Copyright Panitia Pilkades Desa Muara Bakti Kecamatan Babelan</p>
    </footer>

    <!-- LOGIKA PROGRAM (JAVASCRIPT) -->
    <script>
        function hitungUsia() {
            const birthInput = document.getElementById('birthdate').value;
            if (!birthInput) {
                alert("Silakan pilih tanggal lahir terlebih dahulu!");
                return;
            }

            // Kunci Tanggal Pelaksanaan: 20 September 2026
            const targetDate = new Date('2026-09-20');
            const birthDate = new Date(birthInput);

            if (birthDate > targetDate) {
                alert("Tanggal lahir tidak boleh melebihi tanggal pelaksanaan (20 September 2026)!");
                return;
            }

            let years = targetDate.getFullYear() - birthDate.getFullYear();
            let months = targetDate.getMonth() - birthDate.getMonth();
            let days = targetDate.getDate() - birthDate.getDate();

            // Penyesuaian jika hari minus
            if (days < 0) {
                months--;
                // Ambil jumlah hari pada bulan sebelumnya
                const prevMonth = new Date(targetDate.getFullYear(), targetDate.getMonth(), 0);
                days += prevMonth.getDate();
            }

            // Penyesuaian jika bulan minus
            if (months < 0) {
                years--;
                months += 12;
            }

            // Tampilkan angka ke dashboard
            document.getElementById('res-years').innerText = years;
            document.getElementById('res-months').innerText = months;
            document.getElementById('res-days').innerText = days;

            // Logika Penentuan Hak Pilih/Syarat Administrasi (Standar 17 Tahun)
            const statusBadge = document.getElementById('status-badge');
            if (years >= 17) {
                statusBadge.className = "text-center p-3 rounded-xl text-sm font-bold bg-emerald-100 text-emerald-800 border border-emerald-200 shadow-sm";
                statusBadge.innerHTML = "🎉 MEMENUHI SYARAT USIA PEMILIH (≥ 17 Tahun)";
            } else {
                statusBadge.className = "text-center p-3 rounded-xl text-sm font-bold bg-rose-100 text-rose-800 border border-rose-200 shadow-sm";
                statusBadge.innerHTML = "⚠️ BELUM CUKUP UMUR UNTUK MEMILIH (< 17 Tahun)";
            }

            // Munculkan kotak hasil dengan efek smooth
            const resultBox = document.getElementById('result-box');
            resultBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
